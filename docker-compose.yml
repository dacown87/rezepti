services:
  rezepti:
    build:
      context: .
      target: production
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  rezepti-dev:
    build:
      context: .
      target: dev
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    profiles:
      - dev
